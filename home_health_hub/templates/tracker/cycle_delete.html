{% extends "tracker/base.html" %}

{% block content %}
<div class="content">
    <div class="container-fluid">
      <h2 class="content-title">Delete</h2>
      <div class="card">
        <form method="POST">
          {% csrf_token %}
          <h2>Are you sure you want to delete the cycle {{ object.cycle_name }}</h2>
          <input class="btn btn-danger" type="submit" value="Yes, Delete">
          <a class="btn btn-secondary" href="{% url 'tracker:cycles' %}">Cancel</a>
        </form>
      </div>
    </div>
</div>
{% endblock content %}
