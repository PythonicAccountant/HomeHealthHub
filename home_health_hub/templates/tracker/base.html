<!DOCTYPE html>
<html lang="en">
<head><!-- Halfmoon CSS -->
<link href="https://cdn.jsdelivr.net/npm/halfmoon@1.1.1/css/halfmoon-variables.min.css" rel="stylesheet" />

<!-- Halfmoon JS -->
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=yes"/>
    <meta name="HandheldFriendly" content="true"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    {% if title %}
    <title>5/3/1 Tracker - {{ title }}</title>
    {% else %}
    <title>5/3/1 Tracker</title>
    {% endif %}

</head>
<body onload="toggleDark()">
  <!-- Page wrapper with .with-navbar class -->
  <div class="page-wrapper with-navbar">
    <!-- Navbar (immediate child of the page wrapper) -->
    <nav class="navbar">
      <!-- Navbar text -->
      <span class="navbar-text text-monospace">5/3/1 Tracker</span> <!-- text-monospace = font-family shifted to monospace -->
      <!-- Navbar nav -->
      <ul class="navbar-nav d-none d-md-flex"> <!-- d-none = display: none, d-md-flex = display: flex on medium screens and up (width > 768px) -->
        <li class="nav-item">
          <a href="{% url 'tracker:tracker' %}" class="nav-link">Workouts</a>
        </li>
        <li class="nav-item">
          <a href="{% url 'tracker:cycles' %}" class="nav-link">Cycles</a>
        </li>
          <li class="nav-item">
              <a href="{% url 'tracker:accessory_tracker' %}" class="nav-link">Accessories</a>
          </li>

        <li class="nav-item">
          <a href="{% url 'tracker:charts' %}" class="nav-link">Charts</a>
        </li>
      </ul>
      <!-- Navbar form (inline form) -->
        <button class="btn btn-primary d-none d-md-flex ml-auto " type="button" onclick="toggleDark()">Dark Mode</button>
      <!-- Navbar content (with the dropdown menu) -->
      <div class="navbar-content d-md-none ml-auto"> <!-- d-md-none = display: none on medium screens and up (width > 768px), ml-auto = margin-left: auto -->
        <div class="dropdown with-arrow">
          <button class="btn" data-toggle="dropdown" type="button" id="navbar-dropdown-toggle-btn-1">
            Menu
            <i class="fa fa-angle-down" aria-hidden="true"></i>
          </button>
          <div class="dropdown-menu dropdown-menu-right w-200" aria-labelledby="navbar-dropdown-toggle-btn-1"> <!-- w-200 = width: 20rem (200px) -->
            <a href="{% url 'tracker:tracker' %}" class="dropdown-item">Workouts</a>
            <a href="{% url 'tracker:cycles' %}" class="dropdown-item">Cycles</a>
            <a href="{% url 'tracker:accessory_tracker' %}" class="dropdown-item">Accessories</a>
            <a href="{% url 'tracker:charts' %}" class="dropdown-item">Charts</a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-content">
                <button class="btn btn-primary btn-block" type="button" onclick="toggleDark()">Dark Mode</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </nav>
<div class="content-wrapper">
{% block content %}
{% endblock %}
</div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/halfmoon@1.1.1/js/halfmoon.min.js"></script>
<script type="text/javascript">
    function toggleDark(){
        halfmoon.toggleDarkMode();
    }
</script>
</body>
</html>
